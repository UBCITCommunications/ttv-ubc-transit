<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UBC Exchange — Departures</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-weight: 300;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 4vh 4vw;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 3vh;
    padding-bottom: 2vh;
    border-bottom: 1px solid #21262d;
  }
  .title {
    font-size: 2.6vw;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .subtitle {
    font-size: 0.9vw;
    color: #7d8590;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }
  .meta {
    font-size: 0.85vw;
    color: #484f58;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* Column headers */
  .col-headers, .row {
    display: grid;
    grid-template-columns: 7vw 1fr 6vw 8vw;
    align-items: center;
    gap: 2vw;
    padding: 1.4vh 0;
  }
  .col-headers {
    font-size: 0.85vw;
    letter-spacing: 0.3em;
    color: #7d8590;
    text-transform: uppercase;
    border-bottom: 1px solid #21262d;
    margin-bottom: 1vh;
  }
  .col-headers .num { text-align: left; }
  .col-headers .min,
  .col-headers .bay { text-align: right; }

  .rows {
    flex: 1;
    overflow: hidden;
  }

  .row {
    border-bottom: 1px solid #161b22;
    transition: opacity 0.3s;
  }
  .row.soon { /* under 10 min — emphasize */ }
  .row.fading { opacity: 0.4; }

  .route-num {
    font-size: 2.6vw;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .route-num.b { color: #58a6ff; }   /* B-Line */
  .route-num.r { color: #f85149; }   /* Rapid */
  .route-num.n { color: #d29922; }   /* Night */

  .headsign {
    font-size: 1.7vw;
    font-weight: 400;
    color: #e6edf3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .bay {
    font-size: 1.1vw;
    color: #7d8590;
    text-align: right;
    letter-spacing: 0.05em;
  }
  .min {
    font-size: 2.2vw;
    font-weight: 500;
    text-align: right;
    color: #e6edf3;
    font-variant-numeric: tabular-nums;
  }
  .min .unit {
    font-size: 1.1vw;
    color: #7d8590;
    margin-left: 0.3vw;
    font-weight: 300;
  }
  .row.soon .min { color: #58a6ff; }

  .empty {
    margin: auto;
    text-align: center;
    color: #484f58;
    font-size: 2vw;
    font-weight: 300;
  }

  footer {
    margin-top: 2vh;
    padding-top: 1.5vh;
    border-top: 1px solid #21262d;
    display: flex;
    justify-content: space-between;
    font-size: 0.8vw;
    color: #484f58;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="subtitle">Next Departures</div>
    <div class="title">UBC Exchange</div>
  </div>
  <div class="meta" id="clock">--:--</div>
</header>

<div class="col-headers">
  <div class="num">Route</div>
  <div>To</div>
  <div class="bay">Bay</div>
  <div class="min">Leaves</div>
</div>

<div class="rows" id="rows">
  <div class="empty">Loading…</div>
</div>

<footer>
  <div id="status">Live · refreshes every minute</div>
  <div id="updated">Data fetched —</div>
</footer>

<script>
const DATA_URL  = 'transit.json';
const RELOAD_MS = 60 * 1000;          // re-read JSON every minute
const TICK_MS   = 30 * 1000;          // recompute "minutes away" every 30 sec
const MAX_ROWS  = 12;                 // how many to show

let data = null;

async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    data = await res.json();
    render();
  } catch (e) {
    console.error('Load failed:', e);
  }
}

function render() {
  if (!data || !data.departures) {
    document.getElementById('rows').innerHTML = '<div class="empty">Loading…</div>';
    return;
  }

  const now = Date.now() / 1000;
  // Recompute minutes from the eta_unix timestamps so the board ticks down between fetches
  const live = data.departures
    .map(d => ({ ...d, min: Math.round((d.eta_unix - now) / 60) }))
    .filter(d => d.min >= 5 && d.min <= 60)
    .slice(0, MAX_ROWS);

  const rows = document.getElementById('rows');
  if (live.length === 0) {
    rows.innerHTML = '<div class="empty">No departures in the next hour.</div>';
  } else {
    rows.innerHTML = live.map(d => buildRow(d)).join('');
  }

  // Footer
  const fetched = new Date(data.generated_at);
  document.getElementById('updated').textContent =
    'Data fetched · ' + fetched.toLocaleTimeString('en-CA', {hour:'2-digit', minute:'2-digit'});
}

function buildRow(d) {
  // Color hints by route prefix
  let routeClass = '';
  if (d.route === '99' || d.route === '84' || d.route === '44') routeClass = 'b';
  else if (d.route.startsWith('R'))                              routeClass = 'r';
  else if (d.route.startsWith('N'))                              routeClass = 'n';

  const soonClass = d.min < 10 ? ' soon' : '';

  return `
    <div class="row${soonClass}">
      <div class="route-num ${routeClass}">${escapeHtml(d.route)}</div>
      <div class="headsign">${escapeHtml(d.headsign || '')}</div>
      <div class="bay">Bay ${escapeHtml(d.bay || '?')}</div>
      <div class="min">${d.min}<span class="unit">min</span></div>
    </div>
  `;
}

function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-CA', {hour:'2-digit', minute:'2-digit'});
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

loadData();
updateClock();
setInterval(loadData, RELOAD_MS);
setInterval(render, TICK_MS);     // re-render with fresh minute counts
setInterval(updateClock, 30000);
</script>
</body>
</html>
