<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UBC Exchange — Departures</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-weight: 300;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 4vh 4vw;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 3vh;
    padding-bottom: 2vh;
    border-bottom: 1px solid #21262d;
  }
  .title {
    font-size: 2.6vw;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .subtitle {
    font-size: 0.9vw;
    color: #7d8590;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }
  .clock {
    font-size: 1.4vw;
    color: #c9d1d9;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
  }

  .col-headers, .row {
    display: grid;
    grid-template-columns: 7vw 1fr 6vw 8vw;
    align-items: center;
    gap: 2vw;
    padding: 1.4vh 0;
  }
  .col-headers {
    font-size: 0.85vw;
    letter-spacing: 0.3em;
    color: #7d8590;
    text-transform: uppercase;
    border-bottom: 1px solid #21262d;
    margin-bottom: 1vh;
  }
  .col-headers .num { text-align: left; }
  .col-headers .min,
  .col-headers .bay { text-align: right; }

  .rows { flex: 1; overflow: hidden; }
  .row { border-bottom: 1px solid #161b22; }

  .route-num {
    font-size: 2.6vw;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .route-num.b { color: #58a6ff; }
  .route-num.r { color: #f85149; }
  .route-num.n { color: #d29922; }

  .headsign {
    font-size: 1.7vw;
    font-weight: 400;
    color: #e6edf3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .bay {
    font-size: 1.1vw;
    color: #7d8590;
    text-align: right;
    letter-spacing: 0.05em;
  }
  .min {
    font-size: 2.2vw;
    font-weight: 500;
    text-align: right;
    color: #e6edf3;
    font-variant-numeric: tabular-nums;
  }
  .min .unit {
    font-size: 1.1vw;
    color: #7d8590;
    margin-left: 0.3vw;
    font-weight: 300;
  }
  .row.soon .min { color: #58a6ff; }

  .empty {
    margin: auto;
    text-align: center;
    color: #484f58;
    font-size: 2vw;
    font-weight: 300;
  }

  footer {
    margin-top: 2vh;
    padding-top: 1.5vh;
    border-top: 1px solid #21262d;
    display: flex;
    justify-content: space-between;
    font-size: 0.8vw;
    color: #484f58;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="subtitle">Next Departures</div>
    <div class="title">UBC Exchange</div>
  </div>
  <div class="clock" id="clock">--:--</div>
</header>

<div class="col-headers">
  <div class="num">Route</div>
  <div>To</div>
  <div class="bay">Bay</div>
  <div class="min">Leaves</div>
</div>

<div class="rows" id="rows">
  <div class="empty">Loading…</div>
</div>

<footer>
  <div>Scheduled times · Vancouver local</div>
  <div id="schedule-info">—</div>
</footer>

<script>
const DATA_URL    = 'schedule.json';
const RELOAD_MS   = 6 * 60 * 60 * 1000;   // re-fetch schedule every 6 hours
const TICK_MS     = 30 * 1000;            // re-render every 30 sec
const MAX_ROWS    = 12;
const HIDE_UNDER  = 1;   // hide buses leaving in less than this many minutes
const SHOW_AHEAD  = 90;  // don't show buses more than this many minutes out

let schedule = null;

async function loadSchedule() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    schedule = await res.json();
    render();
  } catch (e) {
    console.error('Schedule load failed:', e);
  }
}

function getTodayBucket() {
  const d = new Date().getDay(); // 0 = Sun, 6 = Sat
  if (d === 0) return 'sunday';
  if (d === 6) return 'saturday';
  return 'weekday';
}

function nowMinuteOfDay() {
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes() + n.getSeconds() / 60;
}

function render() {
  if (!schedule) {
    document.getElementById('rows').innerHTML = '<div class="empty">Loading…</div>';
    return;
  }

  const bucket = getTodayBucket();
  const todays = schedule.schedule[bucket] || [];
  const nowMin = nowMinuteOfDay();

  const upcoming = todays
    .map(d => ({ ...d, minutesAway: d.m - nowMin }))
    .filter(d => d.minutesAway >= HIDE_UNDER && d.minutesAway <= SHOW_AHEAD)
    .sort((a, b) => a.minutesAway - b.minutesAway)
    .slice(0, MAX_ROWS);

  const rows = document.getElementById('rows');
  if (upcoming.length === 0) {
    rows.innerHTML = `<div class="empty">No scheduled departures in the next ${SHOW_AHEAD} minutes.</div>`;
  } else {
    rows.innerHTML = upcoming.map(buildRow).join('');
  }

  document.getElementById('schedule-info').textContent =
    bucket.charAt(0).toUpperCase() + bucket.slice(1) + ' schedule';
}

function buildRow(d) {
  let routeClass = '';
  if (d.r === '99' || d.r === '84' || d.r === '44') routeClass = 'b';
  else if (d.r.startsWith('R'))                      routeClass = 'r';
  else if (d.r.startsWith('N'))                      routeClass = 'n';

  const min = Math.round(d.minutesAway);
  const soonClass = min < 10 ? ' soon' : '';

  return `
    <div class="row${soonClass}">
      <div class="route-num ${routeClass}">${escapeHtml(d.r)}</div>
      <div class="headsign">${escapeHtml(d.h || '')}</div>
      <div class="bay">Bay ${escapeHtml(d.b || '?')}</div>
      <div class="min">${min}<span class="unit">min</span></div>
    </div>
  `;
}

function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-CA', {hour:'2-digit', minute:'2-digit'});
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

loadSchedule();
updateClock();
setInterval(loadSchedule, RELOAD_MS);
setInterval(render,       TICK_MS);
setInterval(updateClock,  30000);
</script>
</body>
</html>
